<!doctype html>
<html lang="es">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Sin conexión · Soto del Prior</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#16a34a" />
    <style>
        :root { color-scheme: light; }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
            background: #f9fafb;
            color: #111827;
            padding: 1.5rem;
        }
        .card {
            max-width: 28rem;
            background: #fff;
            border: 1px solid #e5e7eb;
            border-radius: 1rem;
            padding: 1.5rem;
            box-shadow: 0 1px 2px rgba(0,0,0,.04);
            text-align: center;
        }
        .icon {
            width: 64px; height: 64px;
            margin: 0 auto 1rem;
            border-radius: 50%;
            background: #ecfdf5;
            display: flex; align-items: center; justify-content: center;
            color: #047857;
            font-size: 32px;
        }
        h1 { font-size: 1.25rem; margin: 0 0 .5rem; }
        p { color: #4b5563; line-height: 1.5; font-size: .95rem; }
        button {
            margin-top: 1rem;
            background: #16a34a;
            color: #fff;
            border: 0;
            border-radius: .5rem;
            padding: .6rem 1.2rem;
            font-weight: 600;
            cursor: pointer;
        }
        button:hover { background: #15803d; }
        small { color: #9ca3af; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>Sin conexión</h1>
        <p>
            Estás trabajando en una zona sin cobertura. Las pantallas que ya
            habías visitado siguen disponibles desde la caché. Cuando vuelvas
            a tener red, la app se sincronizará automáticamente.
        </p>
        <button onclick="location.reload()">Reintentar</button>
        <p><small>Soto del Prior · Control Ganadero</small></p>
    </div>
</body>
</html>
